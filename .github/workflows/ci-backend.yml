name: CI Backend

# The backend API routes live inside the Next.js app (app/api/**).
# There is no separate backend package — all API logic is part of the
# root Next.js project. This workflow validates the API layer by
# building the full Next.js app, which compiles and type-checks all
# route handlers under app/api/.

on:
  push:
    branches: [main, master]
    paths:
      - "app/api/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
  pull_request:
    branches: [main, master]
    paths:
      - "app/api/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"

jobs:
  api-build:
    name: API Routes Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check (API routes)
        run: npx tsc --noEmit

      - name: Build Next.js app (validates API route compilation)
        run: npm run build
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 'placeholder' }}
          GOOGLE_SCRIPT_URL: ${{ secrets.GOOGLE_SCRIPT_URL || 'https://placeholder.example.com' }}
